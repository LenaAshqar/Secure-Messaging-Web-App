<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login — Secure Webchat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>Secure Webchat</h1>
        <div class="sub">Sign in to continue to the secure messaging tool.</div>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="form">
            <label for="username">Username / اسم المستخدم</label>
            <input id="username" name="username" type="text" placeholder="alice" required>

            <label for="password">Password / كلمة المرور</label>
            <input id="password" name="password" type="password" placeholder="purple-alice" required>

            <div class="small" style="margin:-8px 0 10px 0">Demo credentials: alice/purple-alice, bob/green-bob, mallory/red-mallory</div>

            <button class="btn pill btn-primary" type="submit">Login</button>
        </form>

        <div class="login-note">🔒 Session-based access. You can log out later from the main page.</div>
    </div>

    <footer>
        Served by Flask at <span class="mono">http://127.0.0.1:8011/</span>.
    </footer>
</div>
</body>
</html>
